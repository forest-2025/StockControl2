# 型変換エラーメッセージ.
typeMismatch.supplierId={0}は選択肢から選択してください
typeMismatch.customerId={0}は選択肢から選択してください
# aなどInteger以外が入力されたとき用.
typeMismatch.isAdmin={0}は選択肢から選択してください
# 入荷フォーム.
typeMismatch.arriveForm.amountOfChange=入荷数を数字で入力してください
# 出荷フォーム.
typeMismatch.shipForm.amountOfChange=出荷数は数字で入力してください
# 在庫修正フォーム.
typeMismatch.stockEditForm.actualProductCount={0}は数字で入力してください


# 共通バリデーションエラーメッセージ.
NotBlank={0}は必ず入力してください
Size={0}は{1}文字以下で入力してください
Min={0}は{1}以上の数量を入力してください
Max={0}は{1}文字以下で入力してください
Range={0}は選択肢から選択してください
Pattern=ひらがなで入力してください
Email=メールアドレス形式で入力してください

# 商品情報の登録・修正用バリデーションエラー.
NotNull.registerForm.supplierId=入荷先名は必ず選択してください
NotNull.productEditForm.supplierId=入荷先名は必ず選択してください
DuplicateProductNumber=商品番号が重複しているので登録できません
NotSupplier=登録されている入荷先名を選択してください

# 入荷用バリデーションエラー.
NotNull.arriveForm.amountOfChange=入荷数は必ず入力してください
Min.arriveForm.amountOfChange=入荷数は{1}以上の数量を入力してください

# 出荷用バリデーションエラー.
NotNull.shipForm.customerId=出荷先名は必ず選択してください
NotNull.shipForm.amountOfChange=出荷数は必ず入力してください
Min.shipForm.amountOfChange=出荷数は{1}以上の数量を入力してください
NotCustomer=登録されている出荷先名を選択してください
QuantityExceedsStock=出荷数が在庫数を越えています

# 在庫修正用バリデーションエラー.
NotNull.stockEditForm.actualProductCount=実在庫数は必ず入力してください
SameQuantity=この商品の在庫の全数量を入力してください (在庫数と同じ数量を入力しないでください)

# ユーザー情報の登録・修正用バリデーションエラー.
Pattern.registerForm.employeeNumber=1文字目は半角英大文字、2文字目から半角数字で5桁入力してください
Pattern.editForm.employeeNumber=1文字目は半角英大文字、2文字目から半角数字で5桁入力してください
NotNull.registerForm.isAdmin=管理者権限は必ず選択してください
NotNull.editForm.isAdmin=管理者権限は必ず選択してください
DuplicateEmployeeNumber=従業員番号が重複しているので登録できません
DuplicateEmailAddress=メールアドレスが重複しているので登録できません

# パスワードの登録・修正用バリデーションエラー.
NotSamePassword=パスワードと確認用パスワードが一致しませんでした
Size.registerForm.password={0}は{2}文字以上{1}文字以下で入力してください
Size.passwordEditForm.password={0}は{2}文字以上{1}文字以下で入力してください
Pattern.passwordEditForm.password=半角英数字と半角記号のなかから入力してください

# 画像ファイルのバリデーションエラー.
InvalidFileName=ファイル名が不正です
OverSize=画像ファイルは20MB以下にしてください
FileFormatsDiffer=画像ファイルはJPEG(.jpgまたは.jpeg)のみ登録できます
NotReadImageFile=画像ファイルとして読み込めません


# <アノテーション名>.<ModelAttribute名>.<フィールド名>=<エラーメッセージ>で登録する.(モデルの名前のためarriveFormのaは小文字でないと反映されない).
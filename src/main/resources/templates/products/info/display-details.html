<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/main-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/products/info/display-details.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">
		<!-- 商品一覧に戻るリンク -->
		<!-- 画面サイズが991以下のときのみ表示する -->
		<div class="d-flex align-items-center justify-content-center mt-5">
			<a class="font-monospace fs-4 none link-primary link-offset-3 link-underline-opacity-25 link-underline-opacity-100-hover fw-bold"
				th:href="@{'/products/info/list'}" th:text="#{backToTheList}"></a>
		</div>

		<div>
			<dl class="row align-items-stretch mt-5 col-md-10 offset-md-1">

				<!-- 画像 -->
				<div class="col-12 col-sm-5 d-flex align-items-center justify-content-center">
					<img class="rounded mx-auto d-block img-fluid"
						th:src="${oneItem.productImage == null ?  '/images/no_image.jpg' : '/upload/' + oneItem.productImage}"
						id="resultImage" th:title="#{productImage}">
				</div>


				<!-- 詳細情報 -->
				<div class="col-12 col-sm-7 mt-4">

					<div class="row d-flex align-items-center justify-content-center text-center">

						<!-- 商品番号 -->
						<div class="col-12 col-sm-7">
							<dt class="bg-secondary-subtle fw-bold" th:text="#{productNumber}"></dt>
							<dd th:text="${oneItem.productNumber}"></dd>
						</div>

						<!-- 商品名 -->
						<div class="col-12 col-sm-7">
							<dt class="bg-secondary-subtle fw-bold" th:text="#{productName}"></dt>
							<dd th:text="${oneItem.productName}"></dd>
						</div>

						<!-- 入荷先名 -->
						<div class="col-12 col-sm-7">
							<dt class="bg-secondary-subtle fw-bold" th:text="#{supplierName}"></dt>
							<dd th:text="${oneItem.supplierName}"></dd>
						</div>

						<!-- 在庫数 -->
						<div class="col-12 col-sm-7">
							<dt class="bg-secondary-subtle fw-bold" th:text="#{stockQuantity}"></dt>
							<dd th:text="${oneItem.stockQuantity}"
								th:classappend="${oneItem.stockQuantity} < 10 ? 'bg-warning-subtle' : ''"></dd>
						</div>

					</div>
				</div>
			</dl>
		</div>

		<div class="col text-center mt-5" sec:authorize="hasRole('ADMIN')">

			<!--/* 小さい画面でもボタンの位置がズレないようにme-3 mb-3で調整している */-->
			<!-- 在庫修正ボタン -->
			<a class="btn btn-info btn-lg me-3 mb-3" th:href="@{'/products/' + ${oneItem.productId} + '/count/edit'}"
				role="button" th:text="#{editStockQuantity}"></a>
			<!-- 商品情報修正ボタン -->
			<a class="btn btn-primary btn-lg me-3 mb-3" th:href="@{'/products/' + ${oneItem.productId} + '/info/edit'}"
				role="button" th:text="#{productInformationEdit}"></a>
			<!-- 画像修正ボタン -->
			<a class="btn btn-secondary btn-lg me-3 mb-3"
				th:href="@{'/products/' + ${oneItem.productId} + '/info/imageEdit'}" role="button"
				th:text="#{productImageEdit}"></a>
			<!-- 商品情報削除ボタン -->
			<a class="btn btn-danger btn-lg me-3 mb-3" th:href="@{'/products/' + ${oneItem.productId} + '/info/delete'}"
				role="button" th:text="#{productInformationDelete}"></a>
		</div>

		<!-- 入出荷・修正履歴 -->
		<div class="col">
			<h3 class="mt-5 mb-3" th:text="#{history}"></h3>
		</div>

		<div class="col table-responsive">
			<table class="table table-striped text-center">

				<thead>
					<tr>
						<th scope="col" th:text="#{registerDateTime}"></th>
						<th scope="col" th:text="#{process}"></th>
						<th scope="col" th:text="#{quantity}"></th>
						<th scope="col" th:text="#{customerName}"></th>
						<th scope="col" th:text="#{fullName}"></th>
						<th scope="col" th:text="#{remarks}"></th>
					</tr>
				</thead>

				<tbody>
					<!--/* 増加修正のレコードは背景色が赤、減少修正のレコードは青になるように設定する */-->

					<tr th:each="item:${historyList.list}" th:classappend="${item.amountOfChange > 0 and item.supplierId == null ? 'table-danger' : ''}
					 + ${item.amountOfChange < 0 and item.customerId == null ? 'table-primary' : ''}">

						<!--/* 登録日を表示する */-->
						<td th:text="${#temporals.format(item.historyRegisterDateTime, 'yyyy-MM-dd HH:mm')}"></td>

						<!--/* 入荷・出荷・増加修正・減少修正のいずれかを在庫の変化数や入荷先・出荷先の有無から判断できるように設定する */-->
						<td th:if="${item.amountOfChange > 0 and item.supplierId != null}" } th:text="#{arrival}">
						</td>
						<td th:if="${item.amountOfChange > 0 and item.supplierId == null}" } th:text="#{increase}">
						</td>
						<td th:if="${item.amountOfChange < 0 and item.customerId != null}" } th:text="#{shipping}">
						</td>
						<td th:if="${item.amountOfChange < 0 and item.customerId == null}" } th:text="#{decrease}">
						</td>

						<!--/* 在庫の変化数が負の数のときに正の数で表示するようにしている */-->
						<td th:text="${item.amountOfChange < 0 ? -(item.amountOfChange) : item.amountOfChange}">
						</td>

						<!--/* 出荷のときだけ出荷先名を表示する */-->
						<td th:text="${item.customerId == null } ? '' : ${item.customerName}"></td>

						<!--/* 担当者を表示する */-->
						<td th:text="${item.familyName + ' ' + item.firstName}"></td>

						<!--/* 備考を表示する */-->
						<td th:text="${item.remarks}"></td>

					</tr>
				</tbody>
			</table>

			<!-- ページネーション -->
			<div class="d-flex overflow-x-auto justify-content-sm-center mt-5 mb-5" th:if="${historyList.pages > 1}">
				<nav class="m-2" aria-label="Page navigation">
					<ul class="pagination pagination-lg">

						<!-- 前のページ -->
						<li class="page-item" th:classappend="${!historyList.hasPreviousPage} ? 'disabled'">
							<a class="page-link"
								th:href="@{'/products/' + ${oneItem.productId} + '/info/display-details'(page=${historyList.prePage == 0} ? '1' : ${historyList.prePage})}"
								aria-label="Previous">
								<span aria-hidden="true">&laquo;</span>
							</a>
						</li>

						<!-- ページ番号 -->
						<li class="page-item" th:each="i : ${historyList.navigatepageNums}"
							th:classappend="${i} == ${historyList.pageNum} ? 'active'">
							<a class="page-link"
								th:href="@{'/products/' + ${oneItem.productId} + '/info/display-details'(page=${i})}"
								th:text="${i}"></a>
						</li>

						<!-- 次のページ -->
						<li class="page-item" th:classappend="${!historyList.hasNextPage} ? 'disabled'">
							<a class="page-link"
								th:href="@{'/products/' + ${oneItem.productId} + '/info/display-details'(page=${historyList.nextPage == 0} ? '1' : ${historyList.nextPage})}"
								aria-label="Next">
								<span aria-hidden="true">&raquo;</span>
							</a>
						</li>

					</ul>
				</nav>
			</div>
		</div>
	</div>
</body>


</html>

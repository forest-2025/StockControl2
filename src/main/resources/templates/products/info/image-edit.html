<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/products/info/image-edit.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="alert alert-secondary mt-5" role="alert">
			<div th:text="#{imageEdit}"></div>
			<div class="fs-4 fw-bold  text-danger mt-3 mb-3" th:text="#{imageEditAlert}"></div>
		</div>

		<form method="post" th:object="${imageEditForm}"
			th:action="@{'/products/' + ${product.productId} + '/info/imageEdit'}" enctype="multipart/form-data">

			<!-- 商品番号 -->
			<div>
				<div class="mb-1" th:text="#{productNumber}"></div>
				<div class="ms-3 mb-3" th:text="${product.productNumber}"></div>
			</div>


			<!-- 商品名 -->
			<div>
				<div class="mb-1" th:text="#{productName}"></div>
				<div class="ms-3 mb-3" th:text="${product.productName}"></div>
			</div>


			<!-- 画像 -->
			<div>
				<label class="form-label mb-1" for="formFile" th:text="#{selectImage}"></label>
				<input type="file" class="form-control mb-3 responsive-text" th:field="*{productFile}"
					th:aria-label="#{selectImage}" accept="image/jpeg">


				<!--/* エラーがあるか確認し、エラーがあった時の設定を記述 */-->
				<div class="alert alert-warning alert-dismissible fade show" role="alert" th:if="${errors}"
					th:each="error : ${errors}">

					<!-- エラーメッセージ -->
					<span th:text="${error}"></span>

					<!-- エラーメッセージを消せるボタン -->
					<button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="Close"></button>

				</div>
			</div>

			<div class="mt-5">
				<!-- 確定ボタン -->
				<label for="productImageEdit"></label>
				<button class="btn btn-secondary btn-lg me-2 mb-5" type="submit" id="productImageEdit"
					name="productImageEdit" th:text="#{confirmed}"></button>

				<!-- キャンセルボタン -->
				<a class="btn btn-outline-secondary btn-lg mb-5"
					th:href="@{/products/{productId}/info/display-details(productId=${product.productId})}"
					role="button" id="cancel" name="cancel" th:text="#{cancel}"></a>
			</div>
		</form>

	</div>
</body>

</html>

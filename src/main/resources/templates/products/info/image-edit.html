<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/products/info/image-edit.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="fs-4 fw-bold text-center mt-5 ms-5 me-5 mb-4">
			<div class="message-underline" th:text="#{imageEdit}"></div>
		</div>
		
		<div>
			<div class="text-danger fw-bold text-center" th:text="#{imageEditAlert}"></div>
		</div>
		
		<div>

			<form method="post" th:object="${imageEditForm}"
				th:action="@{'/products/' + ${product.productId} + '/info/imageEdit'}" enctype="multipart/form-data">

				<!-- 商品番号 -->
				<div class="mt-4">
					<div class="mb-2" th:text="#{productNumber}"></div>
					<div class="ms-3 mb-2" th:text="${product.productNumber}"></div>
				</div>


				<!-- 商品名 -->
				<div class="mt-4">
					<div class="mb-2" th:text="#{productName}"></div>
					<div class="ms-3 mb-2" th:text="${product.productName}"></div>
				</div>


				<!-- 画像 -->
				<div class="mt-4">
					<label class="form-label mb-2" for="formFile" th:text="#{image}"></label>
					<!--/* responsive-textがあることで画面サイズが小さくても"ファイルが選択されていません"などの文字が読めるようにしている
					 accept="image/jpeg"で選択画面でJPEGの拡張子のファイルだけを初期表示することができる */-->
					<input type="file" class="form-control mb-2 responsive-text" th:field="*{productFile}"
						th:aria-label="#{image}" accept="image/jpeg"
						th:classappend="${errors != null and !errors.isEmpty()} ? ' is-invalid' : ''">

					<!-- エラーメッセージ -->
					<div class="invalid-feedback fs-6" th:if="${errors != null}" th:each="error : ${errors}"
						th:text="${error}">
					</div>
				</div>

				<div class="mt-5">
					<!-- 確定ボタン -->
					<label for="productImageEdit"></label>
					<button class="btn btn-secondary btn-lg me-2 mb-5" type="submit" id="productImageEdit"
						name="productImageEdit" th:text="#{confirmed}"></button>

					<!-- キャンセルボタン -->
					<a class="btn btn-outline-secondary btn-lg mb-5"
						th:href="@{/products/{productId}/info/display-details(productId=${product.productId})}"
						role="button" id="cancel" name="cancel" th:text="#{cancel}"></a>
				</div>
			</form>
		</div>
	</div>
</body>

</html>

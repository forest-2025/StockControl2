<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="alert alert-secondary mt-5" role="alert">
			<span th:text="#{imageEdit}"></span>
		</div>

		<form method="post" th:object="${imageEditForm}" th:action="@{'/products/' + ${oneItem.productId} + '/info/imageEdit'}"
			enctype="multipart/form-data">

			<!-- 画像 -->
			<div>
				<label class="mb-1" for="productFile" th:text="#{selectImage}"></label>
				<input type="file" class="form-control mb-3 fs-5" th:field="*{productFile}" th:aria-label="#{selectImage}">

				<!--/* エラーがあるか確認し、エラーがあった時の設定を記述 */-->
				<div class="alert alert-warning alert-dismissible fade show" role="alert"
					th:if="${#fields.hasErrors('productFile')}">

					<!-- エラーメッセージ -->
					<span th:errors="*{productFile}"></span>

					<!-- エラーメッセージを消せるボタン -->
					<button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="Close"></button>

				</div>
			</div>

			<div class="mt-5">
				<!-- 修正ボタン -->
				<label for="productImageEdit"></label>
				<button class="btn btn-secondary btn-lg me-2 mb-5" type="submit" id="productImageEdit"
					name="productImageEdit" th:text="#{edit}"></button>

				<!-- キャンセルボタン -->
				<a class="btn btn-outline-secondary btn-lg mb-5" 
					th:href="@{/products/{productId}/info/display-details(productId=${oneItem.productId})}"
					role="button" id="cancel" name="cancel" th:text="#{cancel}"></a>
			</div>
		</form>

	</div>
</body>

</html>

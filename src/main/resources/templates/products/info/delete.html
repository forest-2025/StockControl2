<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/form/delete.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="fs-4 fw-bold text-center m-5">
			<div class="message-underline" th:text="#{productInfoDelete}"></div>
		</div>

		<div>

			<form method="post"
				th:action="@{/products/{productId}/info/delete(productId=${productWithSupplier. product.productId})}">

				<!-- 商品番号 -->
				<div>
					<div class="mb-2" for="productNumber" th:text="#{productNumber}"></div>
					<div class="ms-3 mb-2" th:text="${productWithSupplier.product.productNumber}"></div>
				</div>

				<!-- 商品名 -->
				<div class="mt-4">
					<div class="mb-2" for="productName" th:text="#{productName}"></div>
					<div class="ms-3 mb-2" th:text="${productWithSupplier.product.productName}"></div>
				</div>

				<!-- 入荷先名 -->
				<div class="mt-4">
					<div class="mb-2" for="supplierName" th:text="#{supplierName}"></div>
					<div class="ms-3 mb-2" th:text="${productWithSupplier.supplier.supplierName}"></div>
				</div>


				<div class="mt-5">
					<!-- 確定ボタン -->
					<button class="btn btn-danger btn-lg me-2 mb-5" type="submit" id="productInfoDelete"
						name="productInfoDelete" th:text="#{delete}"></button>

					<!-- キャンセルボタン -->
					<a class="btn btn-outline-danger btn-lg mb-5"
						th:href="@{/products/{productId}/info/display-details(productId=${productWithSupplier.product.productId})}"
						role="button" id="cancel" name="cancel" th:text="#{cancel}"></a>
				</div>
			</form>
		</div>
	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="alert alert-danger mt-5" role="alert">
			<span th:text="#{productInfoDelete}"></span>
		</div>

		<form method="post"
			th:action="@{/products/{productId}/info/delete(productId=${productWithSupplier. product.productId})}" >

			<!-- 商品番号 -->
			<div>
				<div class="mb-1" for="productNumber" th:text="#{productNumber}"></div>
				<div class="ms-3 mb-3" th:text="${productWithSupplier.product.productNumber}"></div>
			</div>

			<!-- 商品名 -->
			<div>
				<div class="mb-1" for="productName" th:text="#{productName}"></div>
				<div class="ms-3 mb-3" th:text="${productWithSupplier.product.productName}"></div>
			</div>

			<!-- 入荷先名 -->
			<div>
				<div class="mb-1" for="supplierName" th:text="#{supplierName}"></div>
				<div class="ms-3 mb-3" th:text="${productWithSupplier.supplier.supplierName}"></div>
			</div>


			<div class="mt-5">
				<!-- 確定ボタン -->
				<button class="btn btn-danger btn-lg me-2 mb-5" type="submit" id="productInfoDelete" name="productInfoDelete"
					 th:text="#{delete}"></button>

				<!-- キャンセルボタン -->
				<a class="btn btn-outline-danger btn-lg mb-5" th:href="@{/products/{productId}/info/display-details(productId=${productWithSupplier.product.productId})}" 
				 role="button" id="cancel" name="cancel" th:text="#{cancel}"></a>
			</div>
		</form>

	</div>
</body>

</html>

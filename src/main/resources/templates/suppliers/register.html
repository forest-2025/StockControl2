<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/form/register.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="fs-4 fw-bold text-center m-5">
			<div class="message-underline" th:text="#{supplierRegisterMessage}"></div>
		</div>

		<div>
			<form method="post" th:object="${registerForm}" th:action="@{/suppliers/register}">

				<!-- 入荷先名 -->
				<div>
					<label class="mb-2" for="supplierName" th:text="#{supplierName}"></label>
					<input class="form-control mb-2 fs-5" type="text" th:field="*{supplierName}"
						th:errorclass="is-invalid">

					<!-- エラーメッセージ -->
					<div class="invalid-feedback fs-6" th:errors="*{supplierName}"></div>
				</div>

				<!-- 入荷先名ふりがな -->
				<div class="mt-4">
					<label class="mb-2" for="supplierFurigana" th:text="#{supplierFurigana}"></label>
					<input class="form-control mb-2 fs-5" type="text" th:field="*{supplierFurigana}"
						th:errorclass="is-invalid">

					<!-- エラーメッセージ -->
					<div class="invalid-feedback fs-6" th:errors="*{supplierFurigana}"></div>
				</div>

				<div class="mt-5">
					<!-- 登録ボタン -->
					<button class="btn btn-success btn-lg me-2 mb-5" type="submit" id="supplierRegister"
						name="supplierRegister" th:text="#{register}"></button>

					<!-- キャンセルボタン -->
					<a class="btn btn-outline-success btn-lg mb-5" th:href="@{/suppliers/list}" role="button"
						id="cancel" name="cancel" th:text="#{cancel}"></a>
				</div>
			</form>
		</div>

	</div>
</body>

</html>

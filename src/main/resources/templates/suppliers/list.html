<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/main-layout}">

<head>
	<!--/* titleはfragmentで置換する */-->
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>
	<div layout:fragment="content">
		<div class="row text-center mt-5 mb-5">
			<!-- 入荷先登録ボタン -->
			<!--/* パソコン用(992px以上)なら入荷先登録ボタンと検索フォームが横並びになるようにしている.
			pb-4は小さい画面で入荷先登録ボタンと検索フォームが二段になっているときに余白をつけるためのもの. */-->
			<div class="col-lg-6 pb-4"
				sec:authorize="hasAuthority('ROLE_ADMIN')">
				<a class="btn btn-dark btn-lg" th:href="@{/suppliers/register}" role="button"
					th:text="#{supplierRegister}"></a>
			</div>

			<!-- 検索フォーム -->
			<!--/* colで入荷先登録ボタンとは別要素と判断されて横方向に分割して表示される. */-->
			<div class="col-lg-6">
				<form method="get" th:action="@{/suppliers/list}">
					<div>
						<!--/* inputタグのw-auto・d-inline-blockはform-controlのwidth:100%,
							display:blockを上書きしている.これにより検索フォームがの横幅がいっぱいに広がらずに適切な大きさにされる.
							またd-inline-blockによりtext-centerが適用される. */-->
						<label for="search"></label>
						<input class="form-control form-control-lg w-auto d-inline-block" type="search" id="search"
							name="search" th:value="${search}" th:placeholder="#{searchForm}">
					</div>
				</form>
			</div>

		</div>

		<!-- 入荷先一覧表示 -->
		<div class="row">
			<!--/* table-responsiveでラップしたテーブルは,テーブルの内容が多くて横幅が広くなったときにスクロールバーが表示される. */-->
			<div class="col table-responsive">
				<table class="table table-striped text-center fs-5">
					<thead>
						<tr>
							<!-- 入荷先ID -->
							<th scope="col">
								<div class="mb-3" th:text="#{supplierId}"></div>
								<!-- 昇順ボタン -->
								<a class="btn btn-outline-danger btn-lg me-3 mb-2"
									th:href="@{/suppliers/list(sortItem='id',sort='asc',search=${search})}"
									role="button" th:text="#{asc}"></a>
								<!-- 降順ボタン -->
								<a class="btn btn-outline-primary btn-lg me-3 mb-2"
									th:href="@{/suppliers/list(sortItem='id',sort='desc',search=${search})}"
									role="button" th:text="#{desc}"></a>
							</th>
							<!-- 入荷先名 -->
							<th scope="col">
								<div class="mb-3" th:text="#{supplierName}"></div>
								<!-- 昇順ボタン -->
								<a class="btn btn-outline-danger btn-lg me-3 mb-2"
									th:href="@{/suppliers/list(sortItem='furigana',sort='asc',search=${search})}"
									role="button" th:text="#{asc}"></a>
								<!-- 降順ボタン -->
								<a class="btn btn-outline-primary btn-lg me-3 mb-2"
									th:href="@{/suppliers/list(sortItem='furigana',sort='desc',search=${search})}"
									role="button" th:text="#{desc}"></a>
							</th>
							<th scope="col"></th>
						</tr>


					</thead>

					<tbody>
						<!--/* 削除済みの入荷先以外を表示する. */-->

						<tr th:each="item:${supplierList.list}">

							<td th:text="${item.supplierId}"></td>
							<td th:text="${item.supplierName}"></td>
							<td>
								<!-- 修正ボタン -->
								<a class="btn btn-primary btn-lg me-3 mb-2"
									th:href="@{'/suppliers/' + ${item.supplierId}+ '/edit'}" role="button"
									th:text="#{edit}"></a>
								<!-- 削除ボタン -->
								<a class="btn btn-danger btn-lg me-3 mb-2"
									th:href="@{'/suppliers/' + ${item.supplierId}+ '/delete'}" role="button"
									th:text="#{delete}"></a>
							</td>
						</tr>
					</tbody>
				</table>

				<!-- ページネーション -->
				<div class="d-flex overflow-x-auto justify-content-sm-center mt-5 mb-5"
					th:if="${supplierList.pages > 1}">
					<nav class="m-2" aria-label="Page navigation">
						<ul class="pagination pagination-lg">

							<!-- 前のページ -->
							<li class="page-item" th:classappend="${!supplierList.hasPreviousPage} ? 'disabled'">
								<a class="page-link" th:href="@{/suppliers/list(page=${supplierList.prePage == 0} ? '1' : ${supplierList.prePage},
									sortItem=${sortItem},sort=${sort},search=${search})}" aria-label="Previous">
									<span aria-hidden="true">&laquo;</span>
								</a>
							</li>

							<!-- ページ番号 -->
							<li class="page-item" th:each="i : ${supplierList.navigatepageNums}"
								th:classappend="${i} == ${supplierList.pageNum} ? 'active'">
								<a class="page-link" th:href="@{/suppliers/list(page=${i},
								sortItem=${sortItem},sort=${sort},search=${search})}" th:text="${i}"></a>
							</li>

							<!-- 次のページ -->
							<li class="page-item" th:classappend="${!supplierList.hasNextPage} ? 'disabled'">
								<a class="page-link" th:href="@{/suppliers/list(page=${supplierList.nextPage == 0} ? '1' : ${supplierList.nextPage},
									sortItem=${sortItem},sort=${sort},search=${search})}" aria-label="Next">
									<span aria-hidden="true">&raquo;</span>
								</a>
							</li>

						</ul>
					</nav>
				</div>
			</div>
		</div>
	</div>
</body>

</html>

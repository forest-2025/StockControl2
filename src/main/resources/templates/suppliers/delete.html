<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/form/delete.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="fs-4 fw-bold text-center m-5">
			<div class="message-underline" th:text="#{supplierDeleteMessage}"></div>
		</div>

		<div>

			<form method="post" th:action="@{/suppliers/{supplierId}/delete(supplierId=${supplier.supplierId})}">

				<!-- 入荷先名 -->
				<div>
					<div class="mb-2" for="supplierName" th:text="#{supplierName}"></div>
					<div class="ms-3 mb-2 fs-5" type="text" th:text="${supplier.supplierName}"></div>
				</div>

				<!-- 入荷先名ふりがな -->
				<div class="mt-4">
					<div class="mb-2" for="supplierFurigana" th:text="#{supplierFurigana}"></div>
					<div class="ms-3 mb-2 fs-5" type="text" th:text="${supplier.supplierFurigana}"></div>
				</div>

				<div class="mt-5">
					<!-- 削除ボタン -->
					<button class="btn btn-danger btn-lg me-2 mb-5" type="submit" id="supplierDelete"
						name="supplierDelete" th:text="#{delete}"></button>

					<!-- キャンセルボタン -->
					<a class="btn btn-outline-danger btn-lg mb-5" th:href="@{/suppliers/list}" role="button" id="cancel"
						name="cancel" th:text="#{cancel}"></a>
				</div>
			</form>
		</div>
	</div>
</body>

</html>

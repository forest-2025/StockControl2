<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/common-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/error/error.css}">
	<title layout:fragment="title" th:text="#{errorPage}"></title>
</head>

<body>
	<div layout:fragment="content">
		<div class="text-center">
			<h3 class="error-message text-danger" th:text="#{errorMessage}"></h3>
			
			<h4 class="mt-4 mb-5"><strong th:text="#{errorStrongMessage}"></strong></h4>

			<form method="post" th:action="@{/logout}">
				<button class="btn btn-danger btn-lg" type="submit" th:text="#{logout}"></button>
			</form>
			
		</div>
	</div>
</body>

</html>

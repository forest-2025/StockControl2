<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="m-5 fs-4 fw-bold text-center">
			<span th:text="#{customerRegisterMessage}"></span>
		</div>

		<form method="post" th:object="${registerForm}" th:action="@{/customers/register}">

			<!-- 出荷先名 -->
			<div class="mb-4">
				<label class="mb-1" for="customerName" th:text="#{customerName}"></label>
				<input class="form-control mb-2 fs-5" type="text" th:field="*{customerName}" th:errorclass="is-invalid" placeholder="例）株式会社サンプル">

				<!-- エラーメッセージ -->
				<div class="invalid-feedback mb-4 fs-6" th:errors="*{customerName}"></div>

			</div>

			<!-- 出荷先名ふりがな -->
			<div>
				<label class="mb-1" for="customerFurigana" th:text="#{customerFurigana}"></label>
				<input class="form-control mb-2 fs-5" type="text" th:field="*{customerFurigana}"
					th:errorclass="is-invalid" placeholder="例）かぶしきがいしゃさんぷる">

				<!-- エラーメッセージ -->
				<div class="invalid-feedback mb-4 fs-6" th:errors="*{customerFurigana}"></div>
			</div>

			<div class="mt-5">
				<!-- 登録ボタン -->
				<button class="btn btn-success btn-lg me-2 mb-5" type="submit" id="customerRegister"
					name="customerRegister" th:text="#{register}"></button>

				<!-- キャンセルボタン -->
				<a class="btn btn-outline-success btn-lg mb-5" th:href="@{/customers/list}" role="button" id="cancel"
					name="cancel" th:text="#{cancel}"></a>
			</div>
		</form>

	</div>
</body>

</html>

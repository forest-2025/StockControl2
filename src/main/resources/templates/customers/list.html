<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/main-layout}">

<head>
	<!--/* titleはfragmentで置換する */-->
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>

</head>

<body>
	<div layout:fragment="content">
		<div class="row text-center mt-5 mb-5">
			<!-- 出荷先登録ボタン -->
			<!--/* パソコン用(992px以上)なら出荷先登録ボタンと検索フォームが横並びになるようにしている.
			pb-4は小さい画面で出荷先登録ボタンと検索フォームが二段になっているときに余白をつけるためのもの. */-->
			<div class="col-lg-6 pb-4" sec:authorize="hasAuthority('ROLE_ADMIN')">
				<a class="btn btn-success btn-lg" th:href="@{/customers/register}" role="button"
					th:text="#{customerRegister}"></a>
			</div>

			<!-- 検索フォーム -->
			<!--/* colで出荷先登録ボタンとは別要素と判断されて横方向に分割して表示される. */-->
			<div class="col">
				<form method="get" th:action="@{/customers/list}">
					<div>
						<!--/* inputタグのw-auto・d-inline-blockはform-controlのwidth:100%,
							display:blockを上書きしている.これにより検索フォームがの横幅がいっぱいに広がらずに適切な大きさにされる.
							またd-inline-blockによりtext-centerが適用される. */-->
						<label for="search"></label>
						<input class="form-control form-control-lg w-auto d-inline-block" type="search" id="search"
							name="search" th:value="${search}" th:placeholder="#{searchForm}">
					</div>
				</form>
			</div>

		</div>

		<!-- 出荷先一覧表示 -->
		<div class="row">
			<!--/* table-responsiveでラップしたテーブルは,テーブルの内容が多くて横幅が広くなったときにスクロールバーが表示される. */-->
			<div class="col table-responsive">
				<table class="table table-striped text-center">
					<thead>
						<tr>
							<!-- 出荷先ID -->
							<th scope="col">
								<div class="d-flex justify-content-center align-items-center">
									<div th:text="#{customerId}"></div>
									<!-- 昇順アイコン -->
									<!--/* リンクのためアイコンが青くなるのでtext-darkで黒に変更する.
										text-decoration-nonでリンクの下線がでないようにしている(基本的には出ないが念のためつけている).
										link-secondaryでホバー時にアイコンの色が変わるようにしている(クリックできるように見せるため). */-->
									<a class="ms-2 text-dark text-decoration-non link-secondary"
										th:href="@{/customers/list(sortItem='id',sort='asc',search=${search})}">
										<i class="bi bi-caret-up-fill"></i>
									</a>
									<!-- 降順アイコン -->
									<a class="text-dark text-decoration-non link-secondary"
										th:href="@{/customers/list(sortItem='id',sort='desc',search=${search})}">
										<i class="bi bi-caret-down-fill"></i>
									</a>
								</div>
							</th>

							<!-- 出荷先名 -->
							<th scope="col">
								<div class="d-flex justify-content-center align-items-center">
									<div th:text="#{customerName}"></div>
									<!-- 昇順ボタン -->
									<a class="ms-2 text-dark text-decoration-non link-secondary"
										th:href="@{/customers/list(sortItem='furigana',sort='asc',search=${search})}">
										<i class="bi bi-caret-up-fill"></i>
									</a>
									<!-- 降順ボタン -->
									<a class="text-dark text-decoration-non link-secondary"
										th:href="@{/customers/list(sortItem='furigana',sort='desc',search=${search})}">
										<i class="bi bi-caret-down-fill"></i>
									</a>
								</div>
							</th>
							<th scope="col"></th>
						</tr>


					</thead>

					<tbody>

						<tr th:each="item:${customerList.list}">

							<td th:text="${item.customerId}"></td>
							<td th:text="${item.customerName}"></td>
							<td>
								<!-- 修正ボタン -->
								<a class="btn btn-primary btn-lg me-3 mb-2"
									th:href="@{'/customers/' + ${item.customerId}+ '/edit'}" role="button"
									th:text="#{edit}"></a>
								<!-- 削除ボタン -->
								<a class="btn btn-danger btn-lg me-3 mb-2"
									th:href="@{'/customers/' + ${item.customerId}+ '/delete'}" role="button"
									th:text="#{delete}"></a>
							</td>
						</tr>
					</tbody>
				</table>

				<!-- ページネーション -->
				<div class="d-flex overflow-x-auto justify-content-sm-center mt-5 mb-5"
					th:if="${customerList.pages > 1}">
					<nav class="m-2" aria-label="Page navigation">
						<ul class="pagination pagination-lg">

							<!-- 前のページ -->
							<li class="page-item" th:classappend="${!customerList.hasPreviousPage} ? 'disabled'">
								<a class="page-link" th:href="@{/customers/list(page=${customerList.prePage == 0} ? '1' : ${customerList.prePage},
									sortItem=${sortItem},sort=${sort},search=${search})}" aria-label="Previous">
									<span aria-hidden="true">&laquo;</span>
								</a>
							</li>

							<!-- ページ番号 -->
							<li class="page-item" th:each="i : ${customerList.navigatepageNums}"
								th:classappend="${i} == ${customerList.pageNum} ? 'active'">
								<a class="page-link"
									th:href="@{/customers/list(page=${i},sortItem=${sortItem},sort=${sort},search=${search})}"
									th:text="${i}"></a>
							</li>

							<!-- 次のページ -->
							<li class="page-item" th:classappend="${!customerList.hasNextPage} ? 'disabled'">
								<a class="page-link" th:href="@{/customers/list(page=${customerList.nextPage == 0} ? '1' : ${customerList.nextPage},
									sortItem=${sortItem},sort=${sort},search=${search})}" aria-label="Next">
									<span aria-hidden="true">&raquo;</span>
								</a>
							</li>

						</ul>
					</nav>
				</div>
			</div>
		</div>
	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="ja" layout:decorate="~{layout/form-layout}">

<head>
	<!-- 個別CSS読込 -->
	<link rel="stylesheet" th:href="@{/css/form/edit.css}">
	<title layout:fragment="title" th:text="${customHeader.headerItem}"></title>
</head>

<body>

	<div layout:fragment="content">

		<!-- メッセージ -->
		<div class="fs-4 fw-bold text-center m-5">
			<div class="message-underline" th:text="#{customerEditMessage}"></div>
		</div>

		<div>
			<form method="post" th:object="${editForm}"
				th:action="@{/customers/{customerId}/edit(customerId=${customer.customerId})}">

				<!-- 出荷先名 -->
				<div>
					<label class="mb-2" for="customerName" th:text="#{customerName}"></label>
					<input class="form-control mb-2 fs-5" type="text" th:field="*{customerName}"
						th:errorclass="is-invalid">

					<!-- エラーメッセージ -->
					<div class="invalid-feedback fs-6" th:errors="*{customerName}"></div>
				</div>

				<!-- 出荷先名ふりがな -->
				<div class="mt-4">
					<label class="mb-2" for="customerFurigana" th:text="#{customerFurigana}"></label>
					<input class="form-control mb-2 fs-5" type="text" th:field="*{customerFurigana}"
						th:errorclass="is-invalid">

					<!-- エラーメッセージ -->
					<div class="invalid-feedback fs-6" th:errors="*{customerFurigana}"></div>
				</div>

				<div class="mt-5">
					<!-- 確定ボタン -->
					<button class="btn btn-primary btn-lg me-2 mb-5" type="submit" id="customerEdit" name="customerEdit"
						th:text="#{confirmed}"></button>

					<!-- キャンセルボタン -->
					<a class="btn btn-outline-primary btn-lg mb-5" th:href="@{/customers/list}" role="button"
						id="cancel" name="cancel" th:text="#{cancel}"></a>
				</div>
			</form>
		</div>
	</div>
</body>

</html>

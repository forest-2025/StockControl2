<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />
	<meta http-equiv="Cache-Control" content="no-store">
	<!-- 共通CSS読込 -->
	<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/layout/form-layout.css}">
	<!-- 共通JS読込 -->
	<script th:src="@{/webjars/jquery/jquery.min.js}" defer></script>
	<script th:src="@{/webjars/popper.js/2.9.2/umd/popper.min.js}" defer></script>
	<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}" defer></script>
	<script th:src="@{/js/cache.js}"></script>
	<title layout:fragment="title"></title>
</head>

<body>
	<!-- ヘッダー -->
	<header>
		<nav layout:replace="~{header/main-header::mainHeader}"></nav>
	</header>
	<!-- コンテンツ -->
	<div class="container">
		<div class="row">
			<div class="col-sm-12 col-md-8 offset-md-2 col-lg-6 offset-lg-3 ps-3 pe-3 fs-5" layout:fragment="content"></div>
		</div>
	</div>
	
</body>

</html>
